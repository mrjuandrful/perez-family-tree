<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Perez Family Tree">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Tree trunk -->
  <rect x="240" y="310" width="32" height="110" rx="10" fill="url(#trunk)"/>
  <!-- Ground roots -->
  <rect x="180" y="400" width="152" height="18" rx="9" fill="#92400e" opacity="0.7"/>
  <!-- Main canopy (large circle) -->
  <circle cx="256" cy="220" r="105" fill="#16a34a" opacity="0.9"/>
  <!-- Left sub-branch -->
  <circle cx="160" cy="270" r="68" fill="#22c55e" opacity="0.85"/>
  <!-- Right sub-branch -->
  <circle cx="352" cy="270" r="68" fill="#22c55e" opacity="0.85"/>
  <!-- Top highlight -->
  <circle cx="256" cy="160" r="70" fill="#4ade80" opacity="0.7"/>
  <!-- Small fruit dots -->
  <circle cx="200" cy="190" r="12" fill="#fbbf24"/>
  <circle cx="300" cy="175" r="10" fill="#f87171"/>
  <circle cx="255" cy="210" r="9" fill="#fbbf24"/>
  <circle cx="175" cy="250" r="9" fill="#f87171"/>
  <circle cx="335" cy="245" r="10" fill="#fbbf24"/>
  <circle cx="240" cy="290" r="8" fill="#f87171"/>
  <!-- Branch lines -->
  <line x1="256" y1="310" x2="180" y2="270" stroke="#166534" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="310" x2="332" y2="270" stroke="#166534" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="310" x2="256" y2="220" stroke="#166534" stroke-width="10" stroke-linecap="round"/>
</svg>
